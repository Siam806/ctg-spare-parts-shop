name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10"

jobs:
  # ─── Install ────────────────────────────────────────────────────────────────
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/backend/node_modules
            apps/storefront/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ─── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/backend/node_modules
            apps/storefront/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install (fallback if cache missed)
        run: pnpm install --frozen-lockfile

      - name: Lint storefront
        run: pnpm --filter @ctg/storefront lint

  # ─── Type-check ─────────────────────────────────────────────────────────────
  typecheck:
    name: Type-check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/backend/node_modules
            apps/storefront/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install (fallback if cache missed)
        run: pnpm install --frozen-lockfile

      - name: Type-check storefront
        run: pnpm --filter @ctg/storefront exec tsc --noEmit

      - name: Type-check backend
        run: pnpm --filter @ctg/backend exec tsc --noEmit

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    env:
      # Provide stub env vars so Next.js build doesn't fail on missing vars
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_placeholder
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
      NEXT_PUBLIC_DEFAULT_REGION: nl
      NEXT_PUBLIC_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/backend/node_modules
            apps/storefront/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install (fallback if cache missed)
        run: pnpm install --frozen-lockfile

      - name: Build storefront
        run: pnpm --filter @ctg/storefront build

      - name: Build backend
        run: pnpm --filter @ctg/backend build

  # ─── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/backend/node_modules
            apps/storefront/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install (fallback if cache missed)
        run: pnpm install --frozen-lockfile

      - name: Run backend unit tests
        run: pnpm --filter @ctg/backend test:unit
